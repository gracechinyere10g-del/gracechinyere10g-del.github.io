<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff00">
<style>
  html, body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; touch-action:none; }
  #game { display:block; background:#111; }
  h1 { color:#0f0; text-align:center; font-family:sans-serif; margin:8px 0; font-size:18px; }
  #msg { color:#aaa; text-align:center; font-family:sans-serif; font-size:12px; }
</style>
</head>
<body>
<h1>Snake Game 🐍</h1>
<canvas id="game"></canvas>
<div id="msg">Use Arrow Keys or Swipe</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const size = 20;
let cols, rows;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
  cols = Math.floor(canvas.width / size);
  rows = Math.floor(canvas.height / size);
}
window.addEventListener('resize', resize);
resize();

let snake = [{x:10,y:10}], dir={x:1,y:0}, food={x:15,y:15}, score=0;

function draw() {
  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0f0"; snake.forEach(s=>ctx.fillRect(s.x*size,s.y*size,size-2,size-2));
  ctx.fillStyle="red"; ctx.fillRect(food.x*size,food.y*size,size-2,size-2);
  ctx.fillStyle="#0f0"; ctx.font="16px sans-serif"; ctx.fillText("Score: "+score,10,20);
}

function update() {
  let head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.y<0||head.x>=cols||head.y>=rows||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    alert("Game Over! Score: "+score); snake=[{x:10,y:10}]; dir={x:1,y:0}; score=0; return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){ score++; food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}; }
  else snake.pop();
  draw();
}
setInterval(update, 120);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'&&dir.y!==1)dir={x:0,y:-1};
  if(e.key==='ArrowDown'&&dir.y!==-1)dir={x:0,y:1};
  if(e.key==='ArrowLeft'&&dir.x!==1)dir={x:-1,y:0};
  if(e.key==='ArrowRight'&&dir.x!==-1)dir={x:1,y:0};
});

// Swipe code
let startX,startY;
canvas.addEventListener('touchstart',e=>{startX=e.touches[0].clientX; startY=e.touches[0].clientY;});
canvas.addEventListener('touchend',e=>{
  let dx=e.changedTouches[0].clientX-startX, dy=e.changedTouches[0].clientY-startY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>30&&dir.x!==-1)dir={x:1,y:0};
    if(dx<-30&&dir.x!==1)dir={x:-1,y:0};
  } else {
    if(dy>30&&dir.y!==-1)dir={x:0,y:1};
    if(dy<-30&&dir.y!==1)dir={x:0,y:-1};
  }
});

// PWA register
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
